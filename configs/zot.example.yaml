# zot configuration.
#
# Every field is optional - zot runs with built-in defaults when no config file
# is present. Copy this file to ~/.config/zot/config.yaml (or pass it with
# --config) and adjust as needed.
#
# ENVIRONMENT VARIABLES (no file required - ideal for containers/CI):
# Every field below has a matching env var, ZOT_<PATH>, where PATH is the field's
# path upper-cased with dots as underscores. Env vars override the file.
#   agent.model           -> ZOT_AGENT_MODEL
#   agent.max_iterations  -> ZOT_AGENT_MAX_ITERATIONS
#   chatbotkit.base_url   -> ZOT_CHATBOTKIT_BASE_URL
#
# The API secret is read from the platform-standard CHATBOTKIT_API_SECRET (and
# the endpoint from CHATBOTKIT_HOST) so it does not need the ZOT_ prefix. Keep
# the secret in the environment, not in this file.

agent:
  # ChatBotKit model alias that drives the autonomous agent.
  model: 'kimi-k2.7-code'

  # Safety cap on plan/act/observe cycles before the agent is forced to stop.
  max_iterations: 1000

  # Optional override of the built-in system instruction. Leave blank to use the
  # default fully-autonomous backstory.
  # backstory: ''

chatbotkit:
  # API token. Prefer the CHATBOTKIT_API_SECRET environment variable over
  # putting the secret here.
  # api_secret: '$CHATBOTKIT_API_SECRET'

  # Optional API endpoint override (handy for staging).
  # base_url: 'https://api.chatbotkit.com'

ui:
  # Render a framed, syntax-highlighted before/after diff under each edit/write
  # the agent makes. Off by default; the --diff flag overrides this.
  diff: false

  # Force the unstyled streaming renderer instead of the full-screen UI. Plain
  # mode is also selected automatically when stdout is not a terminal.
  plain: false

# ChatBotKit conversation features to enable, as a list of name/options pairs.
# Currently exposed: web, chunking. (Override from the CLI with repeated
# --feature flags, e.g. --feature web --feature chunking.)
features:
  # - name: web
  #   options:
  #     search: true
  #     fetch: true
  # - name: chunking
